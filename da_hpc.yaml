Region: us-east-1
Image:
  Os: ubuntu2204 
  CustomAmi: ami-06108148853c960d5 
HeadNode:
  InstanceType: c7i.2xlarge
  Networking:
    SubnetId: subnet-088f38370a401610e 
  Ssh:
    KeyName: global-workflow 
  LocalStorage:
    RootVolume:
      Size: 500
      VolumeType: gp3
      Iops: 10000
      Throughput: 1000
  Iam:
    AdditionalIamPolicies:
      - Policy: arn:aws:iam::aws:policy/AmazonS3FullAccess
      - Policy: arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
Scheduling:
  Scheduler: slurm
  SlurmQueues:
  - Name: compute
    ComputeResources:
    - Name: c7i24xlarge
      Instances:
      - InstanceType: c7i.24xlarge
      MinCount: 0
      MaxCount: 50 
      Efa:
        Enabled: false 
    Networking:
      PlacementGroup:
        Enabled: true
      SubnetIds:
      - subnet-088f38370a401610e
  - Name: processing 
    ComputeResources:
    - Name: c7i12xlarge
      Instances:
      - InstanceType: c7i.12xlarge
      MinCount: 0
      MaxCount: 50 
      Efa:
        Enabled: false 
    Networking:
      PlacementGroup:
        Enabled: true
      SubnetIds:
      - subnet-088f38370a401610e
SharedStorage:
  - MountDir: /lustre
    Name: globalworkflow 
    StorageType: FsxLustre
    FsxLustreSettings:
      FileSystemId: fs-0c4241acba3119042 
